<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>箸拳 Hashiken — 土佐の熱血対決</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1210">
<script defer src="https://cloud.umami.is/script.js" data-website-id="6de48909-2353-4e99-87fa-854079eba9f8"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1210;
    --surface: #2a1f1a;
    --surface-2: #3a2d24;
    --red: #c0392b;
    --red-bright: #e74c3c;
    --gold: #d4a843;
    --gold-light: #f0d68a;
    --cream: #f5e6c8;
    --cream-dim: #c4b496;
    --white: #faf3e6;
    --green: #27ae60;
    --blue: #3498db;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100dvh;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: calc(24px + var(--safe-top)) 20px calc(24px + var(--safe-bottom));
    text-align: center;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px) rotate(-2deg); }
    40% { transform: translateX(8px) rotate(2deg); }
    60% { transform: translateX(-6px) rotate(-1deg); }
    80% { transform: translateX(6px) rotate(1deg); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.1); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 8px rgba(212,168,67,0.3); }
    50% { box-shadow: 0 0 24px rgba(212,168,67,0.6); }
  }
  @keyframes sakeWave {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  @keyframes countDown {
    0% { transform: scale(2); opacity: 0; }
    30% { transform: scale(1); opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; transform: scale(0.8); }
  }
  @keyframes btnGlow {
    0%, 100% { box-shadow: 0 4px 16px rgba(192,57,43,0.4); }
    50% { box-shadow: 0 4px 28px rgba(192,57,43,0.7); }
  }
  @keyframes pushUp {
    0% { transform: translateY(100%); opacity: 0; }
    50% { transform: translateY(-8px); opacity: 1; }
    75% { transform: translateY(4px); }
    100% { transform: translateY(0); opacity: 1; }
  }
  @keyframes fistOut {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.4) translateY(20px); opacity: 0; }
  }

  /* === Persistent Controls === */
  .ctrl-left{position:fixed;top:calc(12px + var(--safe-top));left:12px;z-index:200;}
  .ctrl-right{position:fixed;top:calc(12px + var(--safe-top));right:12px;display:flex;gap:6px;z-index:200;}
  .ctrl-btn{width:42px;height:42px;border-radius:50%;border:1px solid rgba(58,45,36,0.6);background:rgba(42,31,26,0.7);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0.6;}
  .ctrl-btn:active{opacity:1;transform:scale(0.9);}
  .ctrl-btn.vol-muted{opacity:0.35;}
  .ctrl-btn.vol-loud{opacity:1;border-color:rgba(212,168,67,0.6);box-shadow:0 0 10px rgba(212,168,67,0.35);}
  #home-btn{font-size:16px;}
  #bgm-toggle{display:none;}

  /* === Ripple effect === */
  @keyframes rippleEffect{0%{transform:translate(-50%,-50%) scale(0);opacity:0.4;}100%{transform:translate(-50%,-50%) scale(4);opacity:0;}}
  .ripple-circle{position:absolute;border-radius:50%;width:60px;height:60px;background:rgba(245,230,200,0.25);pointer-events:none;animation:rippleEffect 0.5s ease-out forwards;z-index:0;}

  /* === Welcome Screen === */
  #welcome-screen{
    background:
      radial-gradient(ellipse at 50% 30%, rgba(139,90,43,0.12) 0%, transparent 70%),
      repeating-linear-gradient(90deg, rgba(107,68,35,0.03) 0px, rgba(107,68,35,0.03) 1px, transparent 1px, transparent 8px),
      linear-gradient(180deg, #1e1510 0%, #120d09 100%);
  }
  .welcome-deco { font-size: 48px; margin-bottom: 8px; }
  .title {
    font-family: 'Noto Serif JP', serif;
    font-size: 52px;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 2px 16px rgba(212,168,67,0.4), 0 0 60px rgba(212,168,67,0.1);
    letter-spacing: 8px;
    margin-bottom: 0;
  }
  .title-romaji {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    color: var(--cream-dim);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .subtitle {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    color: var(--cream-dim);
    letter-spacing: 4px;
    margin-bottom: 24px;
  }
  .tagline {
    font-size: 14px;
    color: var(--gold-light);
    background: linear-gradient(135deg, rgba(42,31,26,0.9), rgba(58,45,36,0.9));
    padding: 10px 24px;
    border-radius: 20px;
    border: 1px solid rgba(212,168,67,0.4);
    margin-bottom: 24px;
    font-weight: 500;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  /* === Visual Rule Cards === */
  .rules-box {
    background: linear-gradient(180deg, rgba(46,35,25,0.95) 0%, rgba(37,28,20,0.95) 100%);
    border: 1px solid rgba(212,168,67,0.15);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 24px;
    text-align: left;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03);
    position: relative;
    overflow: hidden;
  }
  .rules-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg, transparent, rgba(212,168,67,0.3), transparent);}
  .rules-box h3 {
    font-family: 'Noto Serif JP', serif;
    color: var(--gold);
    margin-bottom: 14px;
    font-size: 16px;
  }
  .rule-card {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(212,168,67,0.08);
  }
  .rule-card:last-child { border-bottom: none; }
  .rule-card .rule-icon {
    font-size: 28px;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
    line-height: 1.2;
  }
  .rule-card .rule-text {
    font-size: 14px;
    color: var(--cream);
    line-height: 1.7;
  }
  .rule-card .rule-text strong { color: var(--gold-light); }
  .rules-highlight {
    margin-top: 14px;
    padding: 14px 16px;
    background: rgba(212,168,67,0.08);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .highlight-icon {
    font-size: 42px;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 12px rgba(212,168,67,0.4));
    animation: sakeWave 2.5s ease-in-out infinite;
  }
  .highlight-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: var(--cream);
    line-height: 1.7;
    text-align: left;
  }
  .highlight-text strong { color: var(--gold-light); font-size: 14px; }

  /* === Buttons === */
  .btn {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 18px;
    font-weight: 700;
    padding: 16px 48px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 2px;
    min-height: 56px;
    touch-action: manipulation;
    position: relative;
    overflow: hidden;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: linear-gradient(135deg, var(--red), var(--red-bright));
    color: var(--white);
    box-shadow: 0 4px 16px rgba(192,57,43,0.4);
    animation: btnGlow 2s infinite;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--bg);
    box-shadow: 0 4px 16px rgba(212,168,67,0.4);
  }
  .btn-sm { font-size: 14px; padding: 10px 24px; border-radius: 8px; }

  /* === Game Screen === */
  #game-screen { justify-content: flex-start; padding-top: 16px; gap: 0; overflow-y: auto; }
  .scoreboard {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 400px;
    background: var(--surface); border-radius: 12px;
    padding: 12px 20px; margin-bottom: 12px;
  }
  .score-side { text-align: center; flex: 1; }
  .score-side .label { font-size: 13px; color: var(--cream-dim); letter-spacing: 1px; }
  .score-side .score {
    font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 700; color: var(--gold);
    font-variant-numeric: tabular-nums;
  }
  .score-divider { font-size: 20px; color: var(--surface-2); padding: 0 8px; }
  .round-info { font-size: 14px; color: var(--cream-dim); margin-bottom: 16px; letter-spacing: 1px; }
  .role-badge {
    display: inline-block; padding: 6px 16px; border-radius: 20px;
    font-size: 14px; font-weight: 700; margin-bottom: 12px; letter-spacing: 2px;
  }
  .role-badge.parent { background: rgba(192,57,43,0.2); color: var(--red-bright); border: 1px solid var(--red); }
  .role-badge.child { background: rgba(52,152,219,0.2); color: var(--blue); border: 1px solid var(--blue); }
  .call-preview {
    font-family: 'Noto Serif JP', serif; font-size: 16px;
    color: var(--gold-light); margin-bottom: 16px; min-height: 24px;
  }
  .arena { width: 100%; max-width: 400px; position: relative; margin-bottom: 16px; }
  .arena-side {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 16px; border-radius: 12px;
    background: var(--surface); margin-bottom: 8px; min-height: 100px;
    position: relative;
  }
  .arena-side.opponent { border: 1px solid var(--surface-2); }
  .arena-side.player { border: 2px solid var(--gold); animation: glow 2s infinite; }
  .arena-side .side-label {
    font-size: 12px; color: var(--cream-dim);
    writing-mode: vertical-rl; letter-spacing: 2px;
  }
  .arena-side .side-label .ai-name { color: var(--red-bright); font-weight: 700; }

  /* === AI Dialogue Bubble === */
  .ai-dialogue {
    position: absolute; top: -44px; left: 50%; transform: translateX(-50%);
    background: rgba(58,45,36,0.95); border: 1px solid var(--gold);
    border-radius: 12px; padding: 8px 14px; font-size: 13px;
    color: var(--cream); z-index: 20;
    animation: bounceIn 0.4s ease; max-width: 280px; text-align: center;
    white-space: nowrap;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .ai-dialogue::after {
    content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    border-left: 8px solid transparent; border-right: 8px solid transparent;
    border-top: 8px solid var(--gold);
  }

  /* === Hand Display === */
  .hand-display {
    flex: 1; min-height: 72px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .hand-display .fist-emoji {
    display: none;
    font-size: 40px; line-height: 1;
  }
  .hand-display .sticks {
    display: none;
    gap: 8px; align-items: flex-end; justify-content: center;
  }
  .hand-display .hand-hint { display: block; }

  .hand-display.ready .fist-emoji { display: block; }
  .hand-display.ready .hand-hint { display: none; }
  .hand-display.ready .sticks { display: none; }

  .hand-display.shaking .fist-emoji { display: block; animation: shake 0.3s infinite; }
  .hand-display.shaking .hand-hint { display: none; }
  .hand-display.shaking .sticks { display: none; }

  .hand-display.push-out .fist-emoji { display: block; animation: fistOut 0.3s ease-in forwards; }
  .hand-display.push-out .sticks { display: flex; animation: pushUp 0.5s 0.15s both; }
  .hand-display.push-out .hand-hint { display: none; }

  .hand-display.show-sticks .fist-emoji { display: none; }
  .hand-display.show-sticks .sticks { display: flex; }
  .hand-display.show-sticks .hand-hint { display: none; }

  .question-marks { font-size: 28px; color: var(--surface-2); letter-spacing: 8px; }

  .chopstick {
    width: 8px; height: 48px;
    background: linear-gradient(180deg, var(--red-bright), #8b1a1a);
    border-radius: 2px 2px 1px 1px;
    box-shadow: 1px 1px 4px rgba(0,0,0,0.4);
  }
  .chopstick.hidden { opacity: 0.15; height: 32px; }

  .pick-section { width: 100%; max-width: 400px; margin-bottom: 16px; }
  .pick-label { font-size: 14px; color: var(--cream-dim); margin-bottom: 10px; }
  .pick-buttons { display: flex; gap: 10px; justify-content: center; }
  .pick-btn {
    width: 72px; height: 72px; border-radius: 12px;
    background: var(--surface); border: 2px solid var(--surface-2);
    color: var(--white); font-family: 'Noto Serif JP', serif;
    font-size: 28px; font-weight: 700; cursor: pointer;
    transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    position: relative; overflow: hidden;
  }
  .pick-btn .mini-sticks { display: flex; gap: 3px; height: 12px; }
  .pick-btn .mini-stick { width: 3px; height: 12px; background: var(--red-bright); border-radius: 1px; }
  .pick-btn:hover { border-color: var(--gold); transform: translateY(-2px); }
  .pick-btn.selected {
    border-color: var(--gold); background: rgba(212,168,67,0.15);
    box-shadow: 0 0 16px rgba(212,168,67,0.3);
  }
  .pick-btn:active { transform: scale(0.95); }
  .confirm-btn-wrap { margin-top: 8px; min-height: 56px; }

  /* === Countdown === */
  .countdown-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26,18,16,0.85);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    padding: var(--safe-top) 20px var(--safe-bottom);
  }
  .countdown-text {
    font-family: 'Noto Serif JP', serif; font-size: 96px; font-weight: 900;
    color: var(--gold); animation: countDown 0.7s ease forwards;
    text-shadow: 0 0 40px rgba(212,168,67,0.5);
  }

  /* === Reveal === */
  .reveal-result { width: 100%; max-width: 400px; text-align: center; }
  .reveal-total { font-family: 'Noto Serif JP', serif; font-size: 20px; color: var(--cream); margin: 8px 0; }
  .reveal-total .num { font-family: 'Inter', sans-serif; font-size: 40px; font-weight: 700; color: var(--gold); }
  .reveal-winner {
    font-family: 'Noto Serif JP', serif; font-size: 28px; font-weight: 900;
    margin: 12px 0; padding: 12px 24px; border-radius: 12px;
    animation: bounceIn 0.5s ease;
  }
  .reveal-winner.win { color: var(--green); background: rgba(39,174,96,0.1); border: 1px solid var(--green); }
  .reveal-winner.lose { color: var(--red-bright); background: rgba(231,76,60,0.1); border: 1px solid var(--red-bright); }
  .reveal-winner.tie { color: var(--gold); background: rgba(212,168,67,0.1); border: 1px solid var(--gold); }
  .reveal-detail { font-size: 15px; color: var(--cream-dim); margin: 8px 0 20px; line-height: 1.6; }

  /* === Game Over === */
  #gameover-screen { gap: 16px; }
  .gameover-title { font-family: 'Noto Serif JP', serif; font-size: 32px; font-weight: 900; margin-bottom: 8px; }
  .sake-cup { font-size: 80px; animation: sakeWave 1.5s ease-in-out infinite; margin: 8px 0; }
  .gameover-msg { font-size: 15px; color: var(--cream); line-height: 1.8; max-width: 340px; }
  .gochisou {
    font-family: 'Noto Serif JP', serif; font-size: 22px; font-weight: 700;
    color: var(--gold); background: var(--surface);
    padding: 12px 28px; border-radius: 12px;
    border: 2px solid var(--gold); animation: pulse 1.5s infinite; margin: 8px 0;
  }
  .irasshai {
    font-family: 'Noto Serif JP', serif; font-size: 24px; font-weight: 900;
    color: var(--red-bright); animation: shake 0.5s ease;
    margin: 8px 0; letter-spacing: 2px;
  }

  /* === Confirm Dialog === */
  .confirm-overlay{position:fixed;inset:0;background:rgba(26,18,16,0.85);display:flex;align-items:center;justify-content:center;z-index:9000;animation:fadeIn 0.2s ease;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
  .confirm-box{background:linear-gradient(180deg, #2e2319 0%, #1e1510 100%);border:1px solid rgba(212,168,67,0.3);border-radius:20px;padding:28px 24px;text-align:center;max-width:300px;width:85%;box-shadow:0 8px 40px rgba(0,0,0,0.5);}
  .confirm-msg{font-family:'Noto Serif JP',serif;font-size:17px;color:var(--cream);margin-bottom:24px;line-height:1.6;}
  .confirm-btns{display:flex;gap:12px;justify-content:center;}
  .confirm-btns button{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:700;padding:10px 24px;border:none;border-radius:12px;cursor:pointer;touch-action:manipulation;min-width:100px;}
  .confirm-yes{background:linear-gradient(135deg,var(--red),var(--red-bright));color:var(--white);}
  .confirm-no{background:rgba(255,255,255,0.08);color:var(--cream);border:1px solid rgba(255,255,255,0.15) !important;}

  /* === Tutorial Overlay === */
  .tutorial-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(26,18,16,0.95);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: var(--safe-top) 20px var(--safe-bottom);
    animation: fadeIn 0.4s ease;
  }
  .tutorial-card {
    background: linear-gradient(180deg, #2e2319, #1e1510);
    border: 1px solid rgba(212,168,67,0.3); border-radius: 20px;
    padding: 28px 24px; max-width: 360px; width: 90%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .tutorial-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .tutorial-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--surface-2); transition: background 0.3s; }
  .tutorial-dot.active { background: var(--gold); }
  .tutorial-title { font-family: 'Noto Serif JP', serif; font-size: 20px; color: var(--gold); margin-bottom: 16px; }
  .tutorial-visual { font-size: 42px; margin: 12px 0; line-height: 1.4; }
  .tutorial-body { font-size: 14px; color: var(--cream); line-height: 1.8; margin-bottom: 20px; }
  .tutorial-body strong { color: var(--gold-light); }
  .tutorial-skip { font-size: 13px; color: var(--cream-dim); cursor: pointer; margin-top: 12px; text-decoration: underline; -webkit-tap-highlight-color: transparent; }

  /* === Toast === */
  .bgm-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--gold);color:var(--gold-light);padding:8px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:300;animation:toastIn 0.3s ease,toastOut 0.3s 1.5s ease forwards;}
  .sound-toast{position:fixed;top:calc(50% - 30px);left:50%;transform:translateX(-50%);background:rgba(42,31,26,0.95);border:1.5px solid var(--gold);color:var(--gold-light);padding:14px 28px;border-radius:14px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:500;z-index:300;animation:toastIn 0.3s ease;white-space:nowrap;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

  /* ========================================
     RESPONSIVE DESIGN
     ======================================== */

  @media (max-width: 375px) { .ctrl-btn { width: 40px; height: 40px; font-size: 17px; } }
  @media (max-width: 390px) {
    .title { font-size: 38px; letter-spacing: 4px; }

    if (params) {
      for (const [k, v] of Object.entries(params))
        str = str.replace(new RegExp('\\{' + k + '\\}', 'g'), v);
    }
    return str;
  },
  updateDOM() {
    document.querySelectorAll('[data-i18n]').forEach(el => {

// 2. AUDIO MANAGER (MP3 BGM + Web Audio SFX)
// ============================================================
const BGM_ORDER = ['moonlight','summer','festival'];
const BGM_ICONS = {moonlight:'🌙', summer:'🏮', festival:'🎆'};
const BGM_KEYS = {moonlight:'bgmMoonlight', summer:'bgmSummer', festival:'bgmFestival'};
const BGM_FILES = {moonlight:'月夜思鄉.mp3', summer:'夏日廟會.mp3', festival:'祭典夜晚.mp3'};
const VOL_PRESETS = [
  {bgm:0, sfx:0, voice:0, icon:'🔇', duck:0},
  {bgm:0.2, sfx:0.6, voice:1.0, icon:'🔉', duck:0.03},
  {bgm:0.5, sfx:1.0, voice:1.0, icon:'🔊', duck:0.08},
];

class AudioManager {
  constructor(){this.ctx=null;this.masterGain=null;this.sfxGain=null;const _sv=localStorage.getItem('kochi-vol');this.volLevel=_sv!==null?parseInt(_sv):2;this.musicPlaying=false;this.bgmStyle='moonlight';this._bgmAudio=null;this._bgmCache={};}
  get muted(){return this.volLevel===0;}
  init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.masterGain=this.ctx.createGain();
    this.masterGain.connect(this.ctx.destination);
    this.sfxGain=this.ctx.createGain();
    this.sfxGain.gain.value=VOL_PRESETS[this.volLevel].sfx;
    this.sfxGain.connect(this.masterGain);
    if(this.muted)this.masterGain.gain.value=0;
  }
  ensureResumed(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();}
  cycleVolume(){
    this.volLevel=(this.volLevel+1)%3;
    localStorage.setItem('kochi-vol',this.volLevel);
    const p=VOL_PRESETS[this.volLevel];
    if(this.sfxGain)this.sfxGain.gain.value=p.sfx;
    if(this.masterGain)this.masterGain.gain.value=this.volLevel===0?0:1;
    if(this._bgmAudio){
      if(this.volLevel===0){this._bgmAudio.pause();}
      else{this._bgmAudio.volume=p.bgm;if(this.musicPlaying)this._bgmAudio.play().catch(()=>{});}
    }
    const mb=document.getElementById('mute-toggle');
    mb.textContent=p.icon;
    mb.classList.remove('vol-muted','vol-loud');
    if(this.volLevel===0)mb.classList.add('vol-muted');
    else if(this.volLevel===2)mb.classList.add('vol-loud');
    if(this.volLevel===0)speechSynthesis.cancel();
  }
  // --- MP3 BGM ---
  _playMP3(key){
    if(this._bgmAudio){this._bgmAudio.pause();this._bgmAudio.currentTime=0;}
    if(!this._bgmCache[key]){this._bgmCache[key]=new Audio(BGM_FILES[key]);this._bgmCache[key].loop=true;}
    this._bgmAudio=this._bgmCache[key];
    this._bgmAudio.volume=this.muted?0:VOL_PRESETS[this.volLevel].bgm;
    this._bgmAudio.play().catch(()=>{});
  }
  startMusic(){if(this.musicPlaying)return;this.init();this.musicPlaying=true;this._playMP3(this.bgmStyle);}
  stopMusic(){this.musicPlaying=false;if(this._bgmAudio){this._bgmAudio.pause();this._bgmAudio.currentTime=0;}}
  // --- SFX ---
  playClick(){
    this.init();const c=this.ctx,n=c.currentTime;
    const o=c.createOscillator();o.type='sine';o.frequency.value=1200;
    const g=c.createGain();g.gain.setValueAtTime(0.15,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.08);
    o.connect(g);g.connect(this.sfxGain);o.start(n);o.stop(n+0.08);
  }
  playCountdown(){
    this.init();const c=this.ctx,n=c.currentTime;
    const o=c.createOscillator();o.type='triangle';
    o.frequency.setValueAtTime(120,n);o.frequency.exponentialRampToValueAtTime(50,n+0.3);
    const g=c.createGain();g.gain.setValueAtTime(0.5,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.4);
    o.connect(g);g.connect(this.sfxGain);o.start(n);o.stop(n+0.4);
    const bs=c.sampleRate*0.05,b=c.createBuffer(1,bs,c.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*(1-i/bs);
    const ns=c.createBufferSource();ns.buffer=b;
    const ng=c.createGain();ng.gain.value=0.2;ns.connect(ng);ng.connect(this.sfxGain);ns.start(n);
  }
  playReveal(){
    this.init();const c=this.ctx,n=c.currentTime;
    [293.66,349.23,440].forEach((f,i)=>{
      const o=c.createOscillator();o.type='sawtooth';
      const g=c.createGain();g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(0.1,n+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,n+0.8);o.frequency.value=f;
      o.connect(g);g.connect(this.sfxGain);o.start(n+i*0.02);o.stop(n+0.9);
    });
  }
  playWin(){
    this.init();const c=this.ctx,n=c.currentTime;
    [293.66,392,440,587.33].forEach((f,i)=>{
      const o=c.createOscillator();o.type='sine';
      const g=c.createGain();const t=n+i*0.12;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.15,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.frequency.value=f;
      o.connect(g);g.connect(this.sfxGain);o.start(t);o.stop(t+0.4);
    });
  }
  playLose(){
    this.init();const c=this.ctx,n=c.currentTime;
    const o=c.createOscillator();o.type='sine';
    o.frequency.setValueAtTime(440,n);o.frequency.exponentialRampToValueAtTime(110,n+0.8);
    const g=c.createGain();g.gain.setValueAtTime(0.15,n);g.gain.linearRampToValueAtTime(0,n+0.8);
    o.connect(g);g.connect(this.sfxGain);o.start(n);o.stop(n+0.8);
  }
  playTie(){
    this.init();const c=this.ctx,n=c.currentTime;
    [0,0.2].forEach(off=>{
      const o=c.createOscillator();o.type='triangle';o.frequency.value=293.66;
      const g=c.createGain();const t=n+off;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.12,t+0.03);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      o.connect(g);g.connect(this.sfxGain);o.start(t);o.stop(t+0.25);
    });
  }
  playSake(){
    this.init();const c=this.ctx,n=c.currentTime;
    for(let i=0;i<12;i++){
      const o=c.createOscillator();o.type='sine';o.frequency.value=200+Math.random()*400;
      const g=c.createGain();const t=n+i*0.08+Math.random()*0.03;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.06,t+0.015);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
      o.connect(g);g.connect(this.sfxGain);o.start(t);o.stop(t+0.06);
    }
  }
}

class VoiceManager {
  constructor(){this.jaVoice=null;this.zhVoice=null;this.ready=false;}
  init(){
    if(this.ready)return;
    const v=speechSynthesis.getVoices();
    this.jaVoice=v.find(x=>x.name==='Kyoko')||v.find(x=>x.name==='O-Ren')||v.find(x=>x.lang&&x.lang.startsWith('ja'))||null;
    this.zhVoice=v.find(x=>/Meijia|Mei-Jia/i.test(x.name))||v.find(x=>x.lang&&x.lang.startsWith('zh-TW'))||v.find(x=>x.lang&&x.lang.startsWith('zh'))||null;
    this.ready=true;
  }
  _duckBGM(){if(audio._bgmAudio&&!audio.muted)audio._bgmAudio.volume=VOL_PRESETS[audio.volLevel].duck;}
  _unduckBGM(){if(audio.muted)return;if(audio._bgmAudio)audio._bgmAudio.volume=VOL_PRESETS[audio.volLevel].bgm;}
  speak(text,opts={}){
    if(audio.muted)return;
    if(!this.ready)this.init();
    const lang=opts.lang||(I18N.lang==='zh'?'zh':'ja');
    const u=new SpeechSynthesisUtterance(text);
    if(lang==='zh'){u.lang='zh-TW';if(this.zhVoice)u.voice=this.zhVoice;}
    else{u.lang='ja-JP';if(this.jaVoice)u.voice=this.jaVoice;}
    u.rate=opts.rate||1;u.pitch=opts.pitch||1;u.volume=VOL_PRESETS[audio.volLevel].voice;
    this._duckBGM();
    u.onend=()=>this._unduckBGM();
    u.onerror=()=>this._unduckBGM();
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
}

// Ripple effect
function addRipple(el,e){
  if(!el||el.classList.contains('disabled'))return;
  const rect=el.getBoundingClientRect();
  const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
  const r=document.createElement('span');
  r.className='ripple-circle';r.style.left=x+'px';r.style.top=y+'px';
  const pos=getComputedStyle(el).position;
  if(pos==='static')el.style.position='relative';
  const ov=getComputedStyle(el).overflow;
  if(ov!=='hidden')el.style.overflow='hidden';
  el.appendChild(r);
  r.addEventListener('animationend',()=>r.remove());
}
document.addEventListener('touchstart',function(e){
  const btn=e.target.closest('.btn,.ctrl-btn,.pick-btn');
  if(btn)addRipple(btn,e);
},{passive:true});

function showTutorial(){
  let step=0;
  const steps=[
    {title:'tutStep1Title',body:'tutStep1Body',visual:'🥢🥢🥢'},
    {title:'tutStep2Title',body:'tutStep2Body',visual:'👑 ↔ 🛡️'},
    {title:'tutStep3Title',body:'tutStep3Body',visual:'🎯 🔄 🍶'},
  ];
  const ov=document.createElement('div');
  ov.className='tutorial-overlay';

  function renderStep(){
    const s=steps[step];
    const isLast=step===steps.length-1;
    ov.innerHTML=`
      <div class="tutorial-card">
        <div class="tutorial-dots">${steps.map((_,i)=>`<div class="tutorial-dot${i===step?' active':''}"></div>`).join('')}</div>
        <div class="tutorial-title">${t(s.title)}</div>
        <div class="tutorial-visual">${s.visual}</div>
        <div class="tutorial-body">${t(s.body)}</div>
        <button class="btn btn-gold btn-sm" id="tut-next">${isLast?t('tutGotIt'):t('tutNext')}</button>
        <div class="tutorial-skip" id="tut-skip">${t('tutSkip')}</div>
      </div>
    `;
    ov.querySelector('#tut-next').onclick=()=>{
      audio.playClick();
      if(isLast){finishTutorial();}
      else{step++;renderStep();}
    };
    ov.querySelector('#tut-skip').onclick=()=>{audio.playClick();finishTutorial();};
  }

  function finishTutorial(){
    localStorage.setItem('hashiken-tutorial-done','1');
    ov.remove();
    beginGame();
  }

  renderStep();
  document.body.appendChild(ov);
}

function startRound(){

  $('round-info').textContent=t('roundInfo',{n:state.round});

  }

  if(state.playerRole==='child'){

  }else{

  }

}

function renderPickButtons(){
  let html='';
  for(let n=0;n<=3;n++){
    let sticks='';
    for(let i=0;i<n;i++)sticks+='<div class="mini-stick"></div>';
    html+=`<button class="pick-btn" data-n="${n}" onclick="pickChopsticks(${n})">${n}<div class="mini-sticks">${sticks}</div></button>`;
  }
  $('pick-buttons').innerHTML=html;
}

function pickChopsticks(n){
  audio.playClick();
  state.playerPick=n;
  document.querySelectorAll('.pick-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.dataset.n)===n));
  setHandState('player-hand','ready');
  if(state.playerRole==='child'){
    const call=(n<=1)?1:5;
    $('call-preview').textContent=t('callPreviewChildN',{n:call});
  }
  $('confirm-wrap').innerHTML=`<button class="btn btn-gold btn-sm" onclick="confirmPick()">${t('confirmBtn')}</button>`;
}

async function confirmPick(){
  if(state.playerPick===null)return;
  audio.playClick();
  $('pick-section').style.display='none';
  $('confirm-wrap').innerHTML='';

  state.aiPick=aiChoose();

  setHandState('player-hand','ready');
  setHandState('ai-hand','ready');

  renderSticks('player-sticks',state.playerPick);
  renderSticks('ai-sticks',state.aiPick);

  await wait(300);

  setHandState('player-hand','shaking');
  setHandState('ai-hand','shaking');

  await showCountdown();

  setHandState('player-hand','push-out');
  setHandState('ai-hand','push-out');
  audio.playReveal();

  await wait(700);

  setHandState('player-hand','show-sticks');
  setHandState('ai-hand','show-sticks');

  revealResult();
}

function aiChoose(){
  const role=state.playerRole==='parent'?'child':'parent';
  const w=role==='parent'?[1,2,2,3]:[2,2,3,2];
  return weightedRandom(w);
}
function weightedRandom(w){
  const tot=w.reduce((a,b)=>a+b,0);let r=Math.random()*tot;
  for(let i=0;i<w.length;i++){r-=w[i];if(r<=0)return i;}return w.length-1;
}

async function showCountdown(){
  const ov=document.createElement('div');
  ov.className='countdown-overlay';
  document.body.appendChild(ov);
  ov.innerHTML=`<div class="countdown-text">${t('seNo')}</div>`;
  audio.playCountdown();voice.speak(t('voiceSeNo'),{rate:0.8,pitch:0.9});
  await wait(900);
  ov.innerHTML=`<div class="countdown-text">${t('dase')}</div>`;
  audio.playCountdown();voice.speak(t('voiceDase'),{rate:1.2,pitch:1.2});
  await wait(600);
  document.body.removeChild(ov);
}

function revealResult(){
  const pp=state.playerPick,ap=state.aiPick,total=pp+ap;

  let playerCall,aiCall;
  if(state.playerRole==='parent'){playerCall=3;aiCall=(ap<=1)?1:5;}
  else{playerCall=(pp<=1)?1:5;aiCall=3;}

  let resultType,resultText,detailText;
  if(total%2===0){
    resultType='tie';resultText=t('tieRound');detailText=t('tieDetail',{n:total});
  }else if(total===playerCall){
    resultType='win';resultText=t('winRound');detailText=t('callHitYou',{total,call:playerCall});state.playerScore++;
  }else if(total===aiCall){
    resultType='lose';resultText=t('loseRound');detailText=t('callHitOpp',{total,call:aiCall});state.aiScore++;
  }else{
    // Neither call matches (e.g., total=1 but parent=3 and child=5) - tie
    resultType='tie';resultText=t('tieRound');detailText=t('tieDetail',{n:total});
  }

  setTimeout(()=>{
    if(resultType==='win'){audio.playWin();showAiDialogue('aiLoseRound');}
    else if(resultType==='lose'){audio.playLose();showAiDialogue('aiWinRound');}
    else{audio.playTie();showAiDialogue('aiTieRound');}
  },500);

  $('player-score').textContent=state.playerScore;
  $('ai-score').textContent=state.aiScore;

  const pWho=state.playerRole==='parent'?t('you'):t('aiName');
  const cWho=state.playerRole==='child'?t('you'):t('aiName');
  const pCol=state.playerRole==='parent'?'var(--red-bright)':'var(--blue)';
  const cCol=state.playerRole==='child'?'var(--blue)':'var(--red-bright)';
  const cCall=state.playerRole==='child'?playerCall:aiCall;
  const isGO=state.playerScore>=2||state.aiScore>=2;

  const r=$('reveal-result');
  r.style.display='block';
  r.innerHTML=`
    <div style="font-size:12px;color:var(--cream-dim);margin-bottom:4px;">
      <span style="color:${pCol}">${t('parentCallLabel',{who:pWho})}</span> ｜
      <span style="color:${cCol}">${t('childCallLabel',{who:cWho,call:cCall})}</span>
    </div>
    <div class="reveal-total">${t('revealSum',{pp,ap})} <span class="num">${total}</span></div>
    <div class="reveal-winner ${resultType}">${resultText}</div>
    <div class="reveal-detail">${detailText}</div>
    <button class="btn btn-gold btn-sm" onclick="nextRound('${resultType}')">${isGO?t('seeResult'):t('nextRound')}</button>
  `;
}

function nextRound(resultType){
  audio.playClick();
  if(state.playerScore>=2){gameOver(true);return;}
  if(state.aiScore>=2){gameOver(false);return;}
  if(resultType==='tie')state.playerRole=state.playerRole==='parent'?'child':'parent';
  state.round++;
  startRound();
}

function gameOver(playerWins){
  show('gameover-screen');
  audio.stopMusic();audio.playSake();
  const ps=state.playerScore,as=state.aiScore;
  const duration=Math.round((Date.now()-_gameStartTime)/1000);

  if(playerWins){
    $('gameover-title').innerHTML=`<span style="color:var(--green)">${t('gameoverWinTitle')}</span>`;
    $('gameover-msg').innerHTML=t('gameoverWinMsg',{ps,as});
    $('gochisou').style.display='none';
    setTimeout(()=>{showAiDialogue('aiGameLose');voice.speak(t('voiceWin'),{rate:0.9});},1000);
  }else{
    $('gameover-title').innerHTML=`<span style="color:var(--red-bright)">${t('gameoverLoseTitle')}</span>`;
    $('gameover-msg').innerHTML=t('gameoverLoseMsg',{ps,as});
    $('gochisou').textContent=t('gochisou');
    $('gochisou').style.display='block';
    setTimeout(()=>{showAiDialogue('aiGameWin');voice.speak(t('voiceLose'),{rate:0.8,pitch:0.9});},1000);
  }

  if(typeof umami!=='undefined')umami.track('hashiken-complete',{
    winner:playerWins?'player':'ai',playerScore:ps,aiScore:as,rounds:state.round,duration,lang:I18N.lang
  });
}

function resetAll(){
  audio.playClick();
  state.playerRole=null;state.playerScore=0;state.aiScore=0;
  state.round=1;state.playerPick=null;state.aiPick=null;
  audio.stopMusic();
  show('welcome-screen');
}

// ===== Init =====
document.addEventListener('DOMContentLoaded',()=>{
  I18N.updateDOM();
  const _mb=$('mute-toggle');
  _mb.textContent=VOL_PRESETS[audio.volLevel].icon;
  if(audio.volLevel===0)_mb.classList.add('vol-muted');
  else if(audio.volLevel===2)_mb.classList.add('vol-loud');
  $('bgm-toggle').textContent=BGM_ICONS[audio.bgmStyle];
  if(typeof speechSynthesis!=='undefined'&&speechSynthesis.getVoices().length>0)voice.init();
});
</script>
</body>
</html>
